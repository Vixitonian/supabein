<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupaBein Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3045;
    --accent: #3ecf8e;
    --accent-dim: #2a8f62;
    --text: #e2e8f0;
    --muted: #8892a4;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 8px;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 20px; margin: 0 0 4px; display: flex; align-items: center; gap: 10px; }
  .badge {
    background: var(--accent); color: #0f1117; font-weight: 700; font-size: 12px;
    padding: 2px 8px; border-radius: 5px;
  }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 28px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .04em; }
  input {
    width: 100%; background: #11141c; border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: var(--font);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    cursor: pointer; border: none; border-radius: 6px; font-family: var(--font); font-weight: 600;
    font-size: 13px; padding: 9px 16px;
  }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-small { padding: 5px 10px; font-size: 12px; }
  .err { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 1em; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .muted { color: var(--muted); }
  .mono { font-family: ui-monospace, monospace; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-unlimited { background: rgba(62,207,142,.15); color: var(--accent); }
  .pill-admin { background: rgba(245,158,11,.15); color: var(--warning); }
  .row-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .row-controls input { width: 110px; padding: 5px 8px; font-size: 12px; }
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #loginCard { width: 340px; }
  .hidden { display: none !important; }
  .loading { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }
</style>
</head>
<body>

<div id="loginScreen">
  <div id="loginCard" class="card">
    <h1><span class="badge">SB</span> Admin</h1>
    <p class="sub">Platform operator sign-in — not your regular SupaBein account login.</p>
    <label>Email</label>
    <input id="loginEmail" type="email" autocomplete="username">
    <label>Password</label>
    <input id="loginPassword" type="password" autocomplete="current-password">
    <div id="loginErr" class="err"></div>
    <div style="margin-top:16px">
      <button class="btn-primary" id="loginBtn" style="width:100%">Sign In</button>
    </div>
  </div>
</div>

<div id="mainScreen" class="wrap hidden">
  <div class="top-bar">
    <div>
      <h1><span class="badge">SB</span> Admin</h1>
      <p class="sub" style="margin:0">Accounts &amp; hosted-AI credit</p>
    </div>
    <button class="btn-ghost btn-small" id="logoutBtn">Sign out</button>
  </div>
  <div class="card">
    <div id="usersLoading" class="loading">Loading users…</div>
    <div id="usersErr" class="err"></div>
    <table id="usersTable" class="hidden">
      <thead>
        <tr>
          <th>ID</th><th>Email</th><th>Role</th><th>Projects</th><th>AI Credit</th><th>Grant</th>
        </tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>
</div>

<script>
(function () {
  const API = window.location.origin + '/api/v1';
  const TOKEN_KEY = 'sb_admin_token';

  const $ = (id) => document.getElementById(id);
  const getToken = () => localStorage.getItem(TOKEN_KEY);
  const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
  const clearToken = () => localStorage.removeItem(TOKEN_KEY);

  async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, {
      method, headers, body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || ('Request failed (' + res.status + ')'));
    return json;
  }

  function fmtUsd(microUsd) {
    return '$' + (microUsd / 1000000).toFixed(4);
  }

  function showLogin(message) {
    $('loginScreen').classList.remove('hidden');
    $('mainScreen').classList.add('hidden');
    $('loginErr').textContent = message || '';
  }

  function showMain() {
    $('loginScreen').classList.add('hidden');
    $('mainScreen').classList.remove('hidden');
    loadUsers();
  }

  async function loadUsers() {
    $('usersLoading').classList.remove('hidden');
    $('usersTable').classList.add('hidden');
    $('usersErr').textContent = '';
    try {
      const users = await api('GET', '/admin/users');
      renderUsers(users);
      $('usersLoading').classList.add('hidden');
      $('usersTable').classList.remove('hidden');
    } catch (e) {
      $('usersLoading').classList.add('hidden');
      $('usersErr').textContent = e.message;
    }
  }

  function renderUsers(users) {
    const body = $('usersBody');
    body.innerHTML = '';
    users.forEach((u) => {
      const tr = document.createElement('tr');

      const pills = [];
      if (u.is_platform_admin) pills.push('<span class="pill pill-admin">admin</span>');
      if (u.ai_unlimited) pills.push('<span class="pill pill-unlimited">unlimited AI</span>');

      tr.innerHTML = `
        <td class="mono muted">${u.id}</td>
        <td>${escapeHtml(u.email)} ${pills.join(' ')}</td>
        <td class="muted">${escapeHtml(u.role)}</td>
        <td>${u.project_count}</td>
        <td class="mono">${u.ai_unlimited ? '<span class="muted">unlimited</span>' : fmtUsd(u.ai_balance)}</td>
        <td>
          <div class="row-controls">
            <button class="btn-ghost btn-small" data-action="toggle-unlimited" data-id="${u.id}" data-current="${u.ai_unlimited ? 1 : 0}">
              ${u.ai_unlimited ? 'Revoke unlimited' : 'Grant unlimited'}
            </button>
            <input type="number" placeholder="add $" step="0.01" data-topup="${u.id}">
            <button class="btn-primary btn-small" data-action="topup" data-id="${u.id}">Add</button>
          </div>
        </td>
      `;
      body.appendChild(tr);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const userId = btn.dataset.id;

    try {
      if (btn.dataset.action === 'toggle-unlimited') {
        const newVal = btn.dataset.current !== '1';
        await api('PATCH', '/admin/users/' + userId + '/ai-credit', { unlimited: newVal });
        loadUsers();
      } else if (btn.dataset.action === 'topup') {
        const input = document.querySelector('input[data-topup="' + userId + '"]');
        const dollars = parseFloat(input.value);
        if (!dollars || dollars <= 0) return;
        // Fetch current balance first so "Add $X" is additive, not a reset.
        const users = await api('GET', '/admin/users');
        const u = users.find((x) => String(x.id) === String(userId));
        const newBalance = (u ? u.ai_balance : 0) + Math.round(dollars * 1000000);
        await api('PATCH', '/admin/users/' + userId + '/ai-credit', { balance: newBalance });
        loadUsers();
      }
    } catch (err) {
      alert(err.message);
    }
  });

  $('loginBtn').addEventListener('click', doLogin);
  $('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    $('loginErr').textContent = '';
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    if (!email || !password) { $('loginErr').textContent = 'Email and password are required.'; return; }
    try {
      const res = await api('POST', '/auth/login', { email, password });
      setToken(res.token);
      // Confirm this account is actually a platform admin before showing the panel.
      await api('GET', '/admin/users');
      showMain();
    } catch (e) {
      clearToken();
      showLogin(e.message);
    }
  }

  $('logoutBtn').addEventListener('click', () => {
    clearToken();
    showLogin();
  });

  // Boot: if a token is already stored, verify it's still valid + still admin.
  if (getToken()) {
    api('GET', '/admin/users').then(showMain).catch(() => { clearToken(); showLogin(); });
  }
})();
</script>
</body>
</html>
